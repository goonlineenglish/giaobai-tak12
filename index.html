<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TAK12 · Tra cứu kiến thức & Giao bài nhanh</title>
<style>
  :root{
    --bg:#f4f5fb; --panel:#ffffff; --ink:#1f2433; --muted:#6b7280; --line:#e6e8f0;
    --brand:#5b3df5; --brand-soft:#ece8ff; --accent:#0ea5a5; --warn:#b45309;
    --quiz:#2563eb; --chuyende:#7c3aed; --dangbai:#0891b2; --youtube:#dc2626; --blog:#059669; --other:#6b7280;
    --shadow:0 1px 3px rgba(20,20,50,.08),0 8px 24px rgba(20,20,50,.06);
    --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  header{background:linear-gradient(120deg,#5b3df5,#7c3aed);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.2px}
  header .sub{font-size:12px;opacity:.85}
  header .ds{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  header select{padding:7px 10px;border-radius:8px;border:0;font-size:13px;background:#fff;color:var(--ink)}
  .wrap{max-width:1280px;margin:0 auto;padding:16px 20px 60px}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;padding:10px 12px 10px 34px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5}
  .btn{padding:9px 12px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap}
  .btn:hover{border-color:var(--brand);color:var(--brand)}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn.primary:hover{filter:brightness(1.07);color:#fff}
  .btn.ghost{background:transparent}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
  .seg button{border:0;background:transparent;padding:9px 12px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted)}
  .seg button.on{background:var(--brand-soft);color:var(--brand)}
  .filters{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .fgroup{display:flex;gap:8px;align-items:flex-start;padding:6px 0;flex-wrap:wrap}
  .fgroup .lbl{min-width:86px;font-weight:700;color:var(--muted);font-size:12px;padding-top:5px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{padding:5px 10px;border:1px solid var(--line);border-radius:999px;cursor:pointer;font-size:12.5px;background:#fff;user-select:none}
  .chip:hover{border-color:var(--brand)}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .chip .n{opacity:.6;font-size:11px;margin-left:4px}
  .chip.on .n{opacity:.85}
  .layout{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
  @media(max-width:920px){.layout{grid-template-columns:1fr}.cart{position:static!important}}
  .results-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .results-head .count{font-weight:700}
  .list{display:flex;flex-direction:column;gap:8px}
  .unitgroup{margin-bottom:6px}
  .unitgroup h3{font-size:13px;margin:14px 0 8px;color:var(--brand);border-bottom:2px solid var(--brand-soft);padding-bottom:4px}
  .item{display:flex;gap:10px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
  .item:hover{border-color:#cfd2e6}
  .item.sel{border-color:var(--brand);background:#faf9ff}
  .item input[type=checkbox]{margin-top:3px;width:16px;height:16px;cursor:pointer;flex:0 0 auto}
  .item .body{flex:1;min-width:0}
  .item .title{font-weight:600}
  .item .meta{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
  .badge{display:inline-block;font-size:10.5px;font-weight:700;color:#fff;padding:2px 7px;border-radius:999px;white-space:nowrap}
  .b-quiz{background:var(--quiz)} .b-baithi{background:var(--quiz)} .b-ontap{background:#ea580c} .b-chuyende{background:var(--chuyende)} .b-dangbai{background:#0e7490}
  .b-youtube{background:var(--youtube)} .b-blog{background:var(--blog)} .b-other{background:var(--other)} .b-topic{background:var(--other)}
  .tag{background:#eef0f7;color:#4b5163;border-radius:6px;padding:1px 6px}
  .tag.orphan{background:#fff4e5;color:var(--warn)}
  .tag.free{background:#dcfce7;color:#15803d;font-weight:700}
  .open{flex:0 0 auto;color:var(--muted);text-decoration:none;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:4px 8px}
  .open:hover{color:var(--brand);border-color:var(--brand)}
  .cart{position:sticky;top:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .cart .ch{background:var(--brand-soft);padding:11px 13px;display:flex;align-items:center;gap:8px}
  .cart .ch b{color:var(--brand)} .cart .ch .x{margin-left:auto}
  .cart .settings{padding:11px 13px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cart .settings .full{grid-column:1/-1}
  .cart label{font-size:11.5px;color:var(--muted);font-weight:600;display:block;margin-bottom:3px}
  .cart input,.cart select{width:100%;padding:7px 8px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff}
  .cart .citems{max-height:34vh;overflow:auto;padding:6px 8px}
  .citem{display:block;padding:8px 6px;border-bottom:1px solid var(--line)}
  .citem:last-child{border-bottom:0}
  .citem:hover{background:#f7f7fc}
  .citem .ctop{display:flex;gap:6px;align-items:flex-start}
  .citem .t{flex:1;font-size:12.5px;min-width:0}
  .citem .rm{cursor:pointer;color:var(--muted);border:0;background:transparent;font-size:16px;line-height:1}
  .citem .rm:hover{color:var(--youtube)}
  .citem .cfg{display:flex;gap:10px;margin-top:5px}
  .citem .cfg label{font-size:11px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:4px;margin:0}
  .citem .cfg input{width:58px;padding:4px 6px;border:1px solid var(--line);border-radius:6px;font-size:12.5px;background:#fff}
  .cart .cgrp{font-size:11px;font-weight:700;color:var(--brand);background:var(--brand-soft);padding:4px 8px;border-radius:6px;margin:4px 2px 2px}
  .quickfill{background:#f7f7fc;border-radius:8px;padding:8px}
  .quickfill .qf-row{display:flex;gap:6px}
  .quickfill .qf-row input{flex:1}
  .quickfill .qf-note{font-size:10.5px;color:var(--muted);margin-top:5px}
  .cart .actions{padding:11px 13px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .hint{font-size:11.5px;color:var(--muted);background:#f7f7fc;border-radius:8px;padding:8px 10px}
  .hint b{color:var(--warn)}
  .empty{color:var(--muted);text-align:center;padding:26px 10px;font-size:13px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2433;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .foot{margin-top:18px;font-size:11px;color:var(--muted);text-align:center}
</style>
</head>
<body>
<header>
  <div>
    <h1>TAK12 · Tra cứu kiến thức &amp; Giao bài nhanh</h1>
    <div class="sub" id="subline">—</div>
  </div>
  <div class="ds">
    <label style="font-size:12px;opacity:.9">Chọn chương trình</label>
    <select id="dsSelect"></select>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Tìm theo tên bài, chủ đề ngữ pháp, kỹ năng..." />
    </div>
    <div class="seg" id="viewSeg">
      <button data-v="list" class="on">Danh sách</button>
      <button data-v="unit">Xem theo Unit</button>
    </div>
    <button class="btn ghost" id="clearFilters">Xoá lọc</button>
  </div>

  <div class="filters" id="filters"></div>

  <div class="layout">
    <div>
      <div class="results-head">
        <span class="count" id="resCount">0 bài</span>
        <button class="btn" id="selAll">＋ Chọn tất cả đang hiển thị</button>
      </div>
      <div id="results" class="list"></div>
    </div>

    <aside class="cart">
      <div class="ch">🛒 Giỏ giao bài: <b id="cartN">0</b> bài <button class="btn ghost x" id="cartClear">Xoá giỏ</button></div>
      <div class="settings">
        <div><label>Ngày giao</label><input type="date" id="sStart"></div>
        <div><label>Hạn nộp</label><input type="date" id="sDue"></div>
        <div class="full"><label>Giao hạn hoàn thành (By Date)</label>
          <select id="sByDate"><option value="">— (để trống)</option><option value="Yes">Yes (có hạn theo ngày)</option><option value="No">No</option></select>
        </div>
        <div class="full quickfill"><label>Áp nhanh Số câu (Min Question) cho mọi bài</label>
          <div class="qf-row"><input type="number" id="qfMin" min="0" placeholder="vd 30"><button class="btn" id="qfApply">Áp tất cả</button></div>
          <div class="qf-note">Master Level mặc định = 0; sửa riêng từng bài ở danh sách dưới.</div>
        </div>
      </div>
      <div class="citems" id="cartItems"><div class="empty">Chưa chọn bài nào.<br>Tích chọn ở danh sách bên trái.</div></div>
      <div class="actions">
        <button class="btn primary" id="exportXlsx">⬇ Tải Excel import (.xlsx)</button>
        <button class="btn" id="copyLinks">📋 Copy danh sách link</button>
        <div class="hint"><b>Lưu ý:</b> File chỉ chứa bài tập. Trên TAK12 hãy <b>chọn Lớp + Môn</b> trước, rồi mới <b>Nhập b/tập</b> → upload file này.</div>
      </div>
    </aside>
  </div>

  <div class="foot" id="foot"></div>
</div>

<div class="toast" id="toast"></div>

// ====== Nhãn loại ======
const TYPE_LABEL = { baithi:'Bài thi', ontap:'Ôn tập', chuyende:'Chuyên đề', dangbai:'Dạng bài', youtube:'YouTube', blog:'Blog từ vựng', topic:'Khác', other:'Khác' };
const TYPE_ORDER = { baithi:0, ontap:1, blog:2, youtube:3, chuyende:4, dangbai:5, topic:6, other:7 };
// Loại badge cho bài /q/: thuộc khu vực "Luyện đề thi" (đề thi thật) -> Bài thi; còn lại (luyện theo Unit) -> Ôn tập.
function catOf(it){ return it.type==='quiz' ? (it.areas.includes('Luyện đề thi')?'baithi':'ontap') : it.type; }

// ====== State ======
let DS = DATASETS[0];
let view = 'list';
const filters = { q:'', units:new Set(), skills:new Set(), types:new Set(), areas:new Set(), exams:new Set(), free:new Set() };
const cart = new Map();                  // giỏ CHUNG mọi chương trình; key = "<dsId>::<itemKey>" để không trùng ID /t/ giữa các khối
const cartKey = it => DS.id + '::' + it.key;
const batch = { start:'', due:'', byDate:'' };
let defMin=''; // Số câu mặc định khi thêm bài mới (lấy từ ô "Áp nhanh")

// ====== Helpers ======
const $ = (s,r=document)=>r.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function uniq(arr){return [...new Set(arr)];}

function unitOrder(){ // thứ tự unit theo seq nhỏ nhất trong dataset
  const min = {};
  for(const it of DS.items) for(const u of it.units){
    const s = it.seq==null?9999:it.seq;
    if(min[u]==null||s<min[u]) min[u]=s;
  }
  return Object.keys(min).sort((a,b)=>min[a]-min[b]);
}

// ====== Facets ======
function facetCounts(field){
  const m = new Map();
  for(const it of DS.items){
    const vals = field==='types'?[catOf(it)]:field==='exams'?(it.examType?[it.examType]:[]):field==='free'?(it.free?['Miễn phí']:[]):it[field.slice(0,-1)]||it[field]||[];
    const arr = Array.isArray(vals)?vals:[vals];
    for(const v of arr){ if(v==null||v==='') continue; m.set(v,(m.get(v)||0)+1); }
  }
  return m;
}

function buildFilters(){
  const host = $('#filters'); host.innerHTML='';
  const groups = [
    ['units','Unit', unitOrder()],
    ['skills','Kỹ năng', null],
    ['types','Loại', ['baithi','ontap','chuyende','dangbai','youtube','blog','topic','other']],
    ['areas','Khu vực', null],
    ['exams','Đề thi', null],
    ['free','Học phí', null],
  ];
  for(const [field,label,order] of groups){
    const counts = facetCounts(field);
    let keys = [...counts.keys()];
    if(order) keys.sort((a,b)=>order.indexOf(a)-order.indexOf(b)); else keys.sort((a,b)=>String(a).localeCompare(String(b),'vi'));
    if(!keys.length) continue;
    const row = el('div','fgroup');
    row.appendChild(el('div','lbl',label));
    const chips = el('div','chips');
    for(const k of keys){
      const c = el('div','chip'+(filters[field].has(k)?' on':''));
      const lbl = field==='types'?(TYPE_LABEL[k]||k):k;
      c.innerHTML = esc(lbl)+'<span class="n">'+counts.get(k)+'</span>';
      c.onclick=()=>{ filters[field].has(k)?filters[field].delete(k):filters[field].add(k); render(); };
      chips.appendChild(c);
    }
    row.appendChild(chips);
    host.appendChild(row);
  }
}

// ====== Filtering ======
function passes(it){
  if(filters.q){ const q=filters.q.toLowerCase(); if(!(it.title.toLowerCase().includes(q) || (it.categories||[]).join(' ').toLowerCase().includes(q))) return false; }
  if(filters.units.size && !it.units.some(u=>filters.units.has(u))) return false;
  if(filters.skills.size && !it.skills.some(s=>filters.skills.has(s))) return false;
  if(filters.types.size && !filters.types.has(catOf(it))) return false;
  if(filters.areas.size && !it.areas.some(a=>filters.areas.has(a))) return false;
  if(filters.exams.size && !(it.examType && filters.exams.has(it.examType))) return false;
  if(filters.free.size && !it.free) return false;
  return true;
}

function badge(t){ return '<span class="badge b-'+t+'">'+(TYPE_LABEL[t]||t)+'</span>'; }
function itemMeta(it){
  const parts=[];
  if(it.free) parts.push('<span class="tag free">Miễn phí</span>');
  if(it.units.length) parts.push('<span class="tag">'+it.units.map(esc).join(', ')+'</span>');
  if(it.skills.length) parts.push(it.skills.map(s=>'<span class="tag">'+esc(s)+'</span>').join(' '));
  if(it.examType) parts.push('<span class="tag">'+esc(it.examType)+'</span>');
  if(it.orphan) parts.push('<span class="tag orphan">deep-link</span>');
  return parts.join(' ');
}

function itemRow(it){
  const k = cartKey(it);
  const row = el('div','item'+(cart.has(k)?' sel':''));
  const cb = el('input'); cb.type='checkbox'; cb.checked=cart.has(k);
  cb.onchange=()=>{ toggle(it); };
  const body = el('div','body');
  body.innerHTML = '<div class="title">'+badge(catOf(it))+' '+esc(it.title)+'</div><div class="meta">'+itemMeta(it)+'</div>';
  const open = el('a','open','Mở ↗'); open.href=it.url; open.target='_blank'; open.rel='noopener';
  row.append(cb,body,open);
  return row;
}

function render(){
  buildFilters();
  $('#subline').textContent = `${DS.label} · ${DS.count} link · cập nhật ${DS.generatedAt}`;
  const res = $('#results'); res.innerHTML='';
  const list = DS.items.filter(passes);
  $('#resCount').textContent = list.length+' bài';

  if(!list.length){ res.appendChild(el('div','empty','Không có bài nào khớp bộ lọc.')); }
  else if(view==='unit'){
    const order = unitOrder();
    const groups = new Map();
    for(const it of list){
      let us = it.units.length?it.units:['(Không thuộc Unit)'];
      // khi đang lọc theo Unit, chỉ xếp bài vào đúng (các) Unit được chọn
      // -> tránh bài dùng chung (vd blog từ vựng) hiện ở mọi nhóm Unit
      if(filters.units.size){ const f=us.filter(u=>filters.units.has(u)); if(f.length) us=f; }
      for(const u of us){ if(!groups.has(u))groups.set(u,[]); groups.get(u).push(it); }
    }
    const keys = [...groups.keys()].sort((a,b)=>{
      const ia=order.indexOf(a), ib=order.indexOf(b);
      return (ia<0?999:ia)-(ib<0?999:ib) || a.localeCompare(b,'vi');
    });
    for(const u of keys){
      const g = el('div','unitgroup');
      g.appendChild(el('h3',null,esc(u)+' · '+groups.get(u).length+' bài'));
      const inner = el('div','list');
      groups.get(u).sort((a,b)=>(a.seq==null?9999:a.seq)-(b.seq==null?9999:b.seq) || TYPE_ORDER[catOf(a)]-TYPE_ORDER[catOf(b)] || a.title.localeCompare(b.title,'vi'))
        .forEach(it=>inner.appendChild(itemRow(it)));
      g.appendChild(inner); res.appendChild(g);
    }
  } else {
    list.sort((a,b)=>TYPE_ORDER[catOf(a)]-TYPE_ORDER[catOf(b)] || a.title.localeCompare(b.title,'vi'))
      .forEach(it=>res.appendChild(itemRow(it)));
  }
  renderCart();
}

// ====== Cart ======
function toggle(it){ const k=cartKey(it); if(cart.has(k))cart.delete(k); else cart.set(k,{item:it,dsId:DS.id,dsLabel:DS.label,min:defMin,master:'0'}); render(); }
function renderCart(){
  $('#cartN').textContent = cart.size;
  const host = $('#cartItems'); host.innerHTML='';
  if(!cart.size){ host.appendChild(el('div','empty','Chưa chọn bài nào.<br>Tích chọn ở danh sách bên trái.')); return; }
  // gom theo chương trình (giỏ chung mọi chương trình)
  const groups=new Map();
  for(const e of cart){ const v=e[1], g=v.dsLabel||v.dsId||'—'; if(!groups.has(g))groups.set(g,[]); groups.get(g).push(e); }
  for(const [label,entries] of groups){
    if(groups.size>1) host.appendChild(el('div','cgrp', esc(label)+' · '+entries.length+' bài'));
    for(const [key,v] of entries){
      const it=v.item;
      const c = el('div','citem');
      c.innerHTML = '<div class="ctop"><div class="t">'+badge(catOf(it))+' '+esc(it.title)+'</div><button class="rm" title="Bỏ">×</button></div>'+
        '<div class="cfg"><label>Số câu <input type="number" class="cmin" min="0" value="'+esc(v.min)+'" placeholder="—"></label>'+
        '<label>Master <input type="number" class="cmaster" min="0" value="'+esc(v.master)+'" placeholder="0"></label></div>';
      c.querySelector('.rm').onclick=()=>{ cart.delete(key); render(); };
      const minI=c.querySelector('.cmin'), masI=c.querySelector('.cmaster');
      minI.oninput=()=>{ v.min=minI.value; };
      masI.oninput=()=>{ v.master=masI.value; };
      host.appendChild(c);
    }
  }
}

function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1900); }

// ====== Export: Copy links ======
function copyLinks(){
  if(!cart.size) return toast('Giỏ trống');
  const txt=[...cart.values()].map(v=>v.item.url).join('\n');
  navigator.clipboard?.writeText(txt).then(()=>toast('Đã copy '+cart.size+' link'),()=>fallbackCopy(txt));
}
function fallbackCopy(txt){ const ta=el('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');toast('Đã copy');}catch(e){toast('Không copy được');} ta.remove(); }

// ====== Export: XLSX (pure JS, offline) ======
function crc32(buf){ let c,crc=0xFFFFFFFF; for(let i=0;i<buf.length;i++){ c=(crc^buf[i])&0xFF; for(let k=0;k<8;k++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1); crc=(crc>>>8)^c; } return (crc^0xFFFFFFFF)>>>0; }
function zipStore(files){
  const enc=new TextEncoder();
  const u16=n=>[n&255,(n>>8)&255], u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
  const parts=[], central=[]; let off=0;
  for(const f of files){
    const name=enc.encode(f.name), data=f.data, crc=crc32(data);
    const lh=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0));
    const lhA=Uint8Array.from(lh);
    parts.push(lhA,name,data);
    central.push({name,crc,len:data.length,off});
    off+=lhA.length+name.length+data.length;
  }
  const cdParts=[]; let cdLen=0;
  for(const c of central){
    const h=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(c.crc),u32(c.len),u32(c.len),u16(c.name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(c.off));
    const hA=Uint8Array.from(h); cdParts.push(hA,c.name); cdLen+=hA.length+c.name.length;
  }
  const eocd=Uint8Array.from([].concat(u32(0x06054b50),u16(0),u16(0),u16(central.length),u16(central.length),u32(cdLen),u32(off),u16(0)));
  const all=[...parts,...cdParts,eocd];
  let total=0; all.forEach(a=>total+=a.length);
  const out=new Uint8Array(total); let p=0; for(const a of all){out.set(a,p);p+=a.length;}
  return out;
}
function col(i){ let s=''; i++; while(i){ const m=(i-1)%26; s=String.fromCharCode(65+m)+s; i=Math.floor((i-1)/26);} return s; }
function sheetXml(rows){
  const xe=s=>(s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  let body='';
  rows.forEach((r,ri)=>{
    let cells='';
    r.forEach((v,ci)=>{ cells+='<c r="'+col(ci)+(ri+1)+'" t="str"><v>'+xe(v)+'</v></c>'; });
    body+='<row r="'+(ri+1)+'">'+cells+'</row>';
  });
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><cols><col min="1" max="1" width="46" customWidth="1"/><col min="2" max="2" width="60" customWidth="1"/><col min="3" max="8" width="14" customWidth="1"/></cols><sheetData>'+body+'</sheetData></worksheet>';
}
function makeXlsx(rows){
  const enc=new TextEncoder();
  const ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>';
  const rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
  const wb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Assignments" sheetId="1" r:id="rId1"/></sheets></workbook>';
  const wbr='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>';
  const files=[
    {name:'[Content_Types].xml',data:enc.encode(ct)},
    {name:'_rels/.rels',data:enc.encode(rels)},
    {name:'xl/workbook.xml',data:enc.encode(wb)},
    {name:'xl/_rels/workbook.xml.rels',data:enc.encode(wbr)},
    {name:'xl/worksheets/sheet1.xml',data:enc.encode(sheetXml(rows))},
  ];
  return zipStore(files);
}
function exportXlsx(){
  if(!cart.size) return toast('Giỏ trống');
  const head=['Title','URL','Start Date','Due Date','Min Question','Master Level','Progress','By Date'];
  const rows=[head];
  for(const v of cart.values()){
    rows.push([ v.item.title, v.item.url, batch.start, batch.due, v.min, v.master, '', batch.byDate ]);
  }
  const bytes=makeXlsx(rows);
  const blob=new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  const ids=[...new Set([...cart.values()].map(v=>v.dsId).filter(Boolean))]; const tag=ids.length===1?ids[0]:('tong-hop-'+ids.length+'ct');
  const fn='giao-bai_'+tag+'_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes())+'.xlsx';
  const a=el('a'); a.href=URL.createObjectURL(blob); a.download=fn; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1500);
  toast('Đã tải '+cart.size+' bài → '+fn);
}

  const sel=$('#dsSelect');
  DATASETS.forEach((d,i)=>{ const o=el('option'); o.value=i; o.textContent=d.label||('Lớp '+d.grade+' · '+d.subject+' · '+d.program); sel.appendChild(o); });
  sel.onchange=()=>{ DS=DATASETS[+sel.value]; for(const k in filters){ if(filters[k].clear)filters[k].clear(); } render(); };
}
$('#q').oninput=e=>{ filters.q=e.target.value.trim(); render(); };
$('#viewSeg').onclick=e=>{ const b=e.target.closest('button'); if(!b)return; view=b.dataset.v; [...$('#viewSeg').children].forEach(x=>x.classList.toggle('on',x===b)); render(); };
$('#clearFilters').onclick=()=>{ filters.q=''; $('#q').value=''; ['units','skills','types','areas','exams','free'].forEach(k=>filters[k].clear()); render(); };

$('#cartClear').onclick=()=>{ cart.clear(); render(); };
$('#sStart').onchange=e=>batch.start=e.target.value;

$('#sByDate').onchange=e=>batch.byDate=e.target.value;
$('#qfMin').oninput=e=>defMin=e.target.value;

$('#copyLinks').onclick=copyLinks;
$('#exportXlsx').onclick=exportXlsx;
$('#foot').textContent='Nguồn: TAK12 · AZVocab · YouTube. Công cụ chạy offline, dữ liệu nhúng sẵn trong file này.';

initDatasets();
render();
